{% set versions = {
    "26.06.0": "26.06.0"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}
{% set tag = versions.get(version, version) %}

{% set name = environ.get('ANACONDA_PACKAGE', 'epic')|string|lower %}
{% set root_tag = (root or '')|replace('.', '') %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  git_url: "https://github.com/eic/epic.git"
  git_rev: {{ tag }}

build:
  number: 0
  string: "root{{ root_tag }}"
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
    - git
  host:
    # geant is published only under the hep-forge "eic" label -- this
    # feedstock's own .github/workflows/autoupload.yml adds that channel
    # (scripts/templates/autoupload.yml deliberately does not, most
    # feedstocks don't need it) -- dd4hep pulls geant in transitively.
    - root {{ root }}.*
    - dd4hep>=1.27 root{{ root_tag }}
    # DD4hepConfig.cmake does FIND_DEPENDENCY(Boost REQUIRED) at every
    # consumer's own configure time, so Boost headers must be present
    # in this feedstock's own host env too, not just dd4hep's.
    - libboost-devel
    - fmt
    - jinja2
    - pyyaml
  run:
    - root {{ root }}.*
    - dd4hep>=1.27 root{{ root_tag }}
    - fmt

test:
  commands:
    - test -f "${PREFIX}/lib/libepic.so"
    - test -f "${PREFIX}/share/epic/epic.xml"
    - test -d "${PREFIX}/share/epic/compact"

about:
  home: "https://github.com/eic/epic"
  dev_url: "https://github.com/eic/epic"
  license: "LGPL-3.0"
  summary: "DD4hep Geometry Description of the ePIC Experiment"
  description: |
    epic is the DD4hep-based detector description of the ePIC (Electron-
    Proton/Ion Collider) experiment at the EIC. Built here against
    hep-forge's own dd4hep/root -- part of hep-forge's EIC Phase 1
    simulation-chain build-out (geant -> g4hepem -> dd4hep -> epic ->
    npsim, plus acts).

extra:
  recipe-maintainers:
    - meiyasan
